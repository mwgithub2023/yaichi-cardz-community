# YAICHI 落地页 —— 挂在 app.cardz.game 的 /yaichi/ 子路径下(静态文件)
#
# 把下面几段 location 加进 app.cardz.game 现有的 server { ... } 里即可,
# 主站的 location / 不用动。
#
# 部署:
#   npm ci && npm run build
#   sudo mkdir -p /var/www/yaichi
#   sudo rsync -av --delete dist/ /var/www/yaichi/
#   sudo nginx -t && sudo systemctl reload nginx
#   访问 https://app.cardz.game/yaichi/

# /yaichi 自动补斜杠
location = /yaichi {
    return 301 /yaichi/;
}

# 带哈希的静态资源:长期不可变缓存
location /yaichi/assets/ {
    alias /var/www/yaichi/assets/;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# 页面与其余路径:SPA 兜底
# /yaichi/go/whatsapp 等深链都回 index.html,交给 React 做客户端跳转
location /yaichi/ {
    alias /var/www/yaichi/;
    try_files $uri $uri/ /yaichi/index.html;
}
