# Reverse proxy for yaichi.cardz.game -> Docker container (127.0.0.1:8123)
#
# Install on the HOST machine (not inside the container):
#   sudo cp deploy/nginx-reverse-proxy.conf /etc/nginx/sites-available/yaichi.cardz.game
#   sudo ln -s /etc/nginx/sites-available/yaichi.cardz.game /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# (On RHEL/CentOS put it in /etc/nginx/conf.d/yaichi.cardz.game.conf instead.)

upstream yaichi_cardz_community {
    server 127.0.0.1:8123;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name yaichi.cardz.game;

    # Let's Encrypt HTTP-01 challenge (keep reachable over plain HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Once you have a certificate, uncomment to force HTTPS:
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    location / {
        proxy_pass http://yaichi_cardz_community;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

